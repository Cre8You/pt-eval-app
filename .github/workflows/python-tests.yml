name: Python tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Streamlit app
        run: python -m py_compile pt_app.py

      - name: Compile PT app utilities
        run: python -m py_compile pt_app_utils.py

      - name: Run unit tests
        run: python -m unittest discover
